<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
      min-height: 100vh;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      padding: 32px;
      width: 100%;
      max-width: 480px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a202c;
      margin-bottom: 24px;
      text-align: center;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus { border-color: #667eea; }

    .input-row button {
      padding: 10px 18px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-row button:hover { background: #5a67d8; }
    .input-row button:disabled { background: #a0aec0; cursor: not-allowed; }

    .stats {
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 12px;
      text-align: right;
    }

    ul { list-style: none; }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 10px;
      transition: background 0.15s;
      cursor: pointer;
    }

    li:hover { background: #f7fafc; }

    li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #667eea;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 1rem;
      color: #2d3748;
      transition: color 0.2s;
      word-break: break-all;
    }

    li.checked .item-text {
      text-decoration: line-through;
      color: #a0aec0;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #cbd5e0;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    .delete-btn:hover { color: #e53e3e; background: #fff5f5; }

    .empty {
      text-align: center;
      color: #a0aec0;
      padding: 32px 0;
      font-size: 0.95rem;
    }

    .clear-btn {
      display: block;
      width: 100%;
      margin-top: 20px;
      padding: 10px;
      background: none;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      color: #718096;
      font-size: 0.9rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .clear-btn:hover { border-color: #e53e3e; color: #e53e3e; }

    .loading {
      text-align: center;
      color: #a0aec0;
      padding: 32px 0;
      font-size: 0.95rem;
    }

    .error-msg {
      text-align: center;
      color: #e53e3e;
      font-size: 0.85rem;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛒 쇼핑 리스트</h1>

    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템 입력..." />
      <button id="addBtn" onclick="addItem()">추가</button>
    </div>

    <div class="error-msg" id="errorMsg" style="display:none"></div>
    <div class="stats" id="stats"></div>

    <div class="loading" id="loading">불러오는 중...</div>
    <ul id="list"></ul>
    <div class="empty" id="empty" style="display:none">아이템을 추가해보세요!</div>

    <button class="clear-btn" onclick="clearChecked()">체크된 항목 삭제</button>
  </div>

  <script>
    const SUPABASE_URL = 'https://lkuclvdylsdfcalvaqff.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxrdWNsdmR5bHNkZmNhbHZhcWZmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxNTY2MTcsImV4cCI6MjA4OTczMjYxN30.TtFCQ4MaK70xY6jqujmW5P7UEflLQlIRBNGJcMNcwQg';

    const headers = {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
    };

    let items = [];

    async function api(method, path, body) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
        method,
        headers: { ...headers, 'Prefer': method === 'POST' ? 'return=representation' : 'return=representation' },
        body: body ? JSON.stringify(body) : undefined
      });
      if (!res.ok) throw new Error(await res.text());
      const text = await res.text();
      return text ? JSON.parse(text) : null;
    }

    async function loadItems() {
      try {
        const data = await api('GET', 'shopping_items?order=created_at.asc');
        items = data || [];
        render();
      } catch (e) {
        showError('데이터 불러오기 실패: ' + e.message);
      } finally {
        document.getElementById('loading').style.display = 'none';
      }
    }

    async function addItem() {
      const input = document.getElementById('itemInput');
      const text = input.value.trim();
      if (!text) return;

      setLoading(true);
      try {
        const [newItem] = await api('POST', 'shopping_items', { text, checked: false });
        items.push(newItem);
        input.value = '';
        input.focus();
        render();
      } catch (e) {
        showError('추가 실패: ' + e.message);
      } finally {
        setLoading(false);
      }
    }

    async function toggle(id) {
      const item = items.find(i => i.id === id);
      if (!item) return;
      const newChecked = !item.checked;
      try {
        await api('PATCH', `shopping_items?id=eq.${id}`, { checked: newChecked });
        item.checked = newChecked;
        render();
      } catch (e) {
        showError('수정 실패: ' + e.message);
      }
    }

    async function deleteItem(id) {
      try {
        await api('DELETE', `shopping_items?id=eq.${id}`);
        items = items.filter(i => i.id !== id);
        render();
      } catch (e) {
        showError('삭제 실패: ' + e.message);
      }
    }

    async function clearChecked() {
      const checkedIds = items.filter(i => i.checked).map(i => i.id);
      if (checkedIds.length === 0) return;
      try {
        await api('DELETE', `shopping_items?id=in.(${checkedIds.join(',')})`);
        items = items.filter(i => !i.checked);
        render();
      } catch (e) {
        showError('삭제 실패: ' + e.message);
      }
    }

    function render() {
      const list = document.getElementById('list');
      const empty = document.getElementById('empty');
      const stats = document.getElementById('stats');

      list.innerHTML = '';
      hideError();

      if (items.length === 0) {
        empty.style.display = 'block';
        stats.textContent = '';
      } else {
        empty.style.display = 'none';
        const checked = items.filter(i => i.checked).length;
        stats.textContent = `${checked} / ${items.length} 완료`;

        items.forEach(item => {
          const li = document.createElement('li');
          if (item.checked) li.classList.add('checked');

          li.innerHTML = `
            <input type="checkbox" ${item.checked ? 'checked' : ''} onchange="toggle('${item.id}')" onclick="event.stopPropagation()">
            <span class="item-text">${escapeHtml(item.text)}</span>
            <button class="delete-btn" onclick="deleteItem('${item.id}'); event.stopPropagation()" title="삭제">✕</button>
          `;

          li.addEventListener('click', () => toggle(item.id));
          list.appendChild(li);
        });
      }
    }

    function escapeHtml(text) {
      return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function setLoading(on) {
      document.getElementById('addBtn').disabled = on;
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function hideError() {
      document.getElementById('errorMsg').style.display = 'none';
    }

    document.getElementById('itemInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    loadItems();
  </script>
</body>
</html>
